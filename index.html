<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Cronin Baseball</title>
<style>
:root{--gold:#f1c40f;--blue:#3498db;--grass:#1b3318;--board:#111;--wood:#8b5a2b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;background:#000;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100svh;display:flex;flex-direction:column;}
#banner{height:3.5vh;background:#000;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--gold);border-bottom:1px solid #222;}
#v-frame{width:100%;height:63vh;overflow:hidden;position:relative;background:#000;}
#v-frame canvas{position:absolute!important;width:100%!important;height:100%!important;left:0!important;top:0!important;}
#deck{height:33.5vh;display:grid;grid-template-columns:0.95fr 1.05fr;background:#050505;padding:4px 8px;gap:8px;padding-bottom:env(safe-area-inset-bottom);}
.panel{display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;}
#scoreboard-strip{width:100%;height:5vh;background:var(--board);border:1px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:space-around;padding:0 5px;}
.stat-unit{display:flex;flex-direction:column;align-items:center;}
.stat-label{font-size:7px;color:#666;font-weight:800;}
.dots{display:flex;gap:2px;margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:#222;border:1px solid #333;}
.b-on{background:var(--blue);box-shadow:0 0 5px var(--blue);}
.s-on{background:var(--gold);box-shadow:0 0 5px var(--gold);}
.o-on{background:#e74c3c;box-shadow:0 0 5px #e74c3c;}
#mini-diamond{width:22px;height:22px;position:relative;transform:rotate(45deg);}
.m-base{position:absolute;width:5px;height:5px;border:1px solid #333;background:#111;}
#mb-1{top:0;right:0;}#mb-2{top:0;left:0;}#mb-3{bottom:0;left:0;}
.m-on{background:var(--gold);border-color:#fff;}
#field-container{width:100%;flex-grow:1;background:#000;position:relative;overflow:hidden;margin-top:4px;border-radius:4px;border:1px solid #222;}
.field-svg{width:100%;height:100%;}
.hit-dot{position:absolute;width:16px;height:16px;background:rgba(0,0,0,0.9);border:1px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;transform:translate(-50%,-50%);}
#result-card{width:100%;height:6.5vh;background:var(--board);border:1.5px solid #444;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
#res-main{color:var(--gold);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
#res-sub{color:#aaa;font-size:8.5px;font-family:'Courier New',Courier,monospace;margin-top:2px;font-weight:600;}
#swing-zone{width:100%;flex-grow:1;display:flex;align-items:center;justify-content:center;position:relative;touch-action:none;background:rgba(255,255,255,0.02);border-radius:4px;margin-top:4px;}
#strike-zone{width:80px;height:120px;border:2px solid #fff;background:rgba(255,255,255,0.03);position:relative;pointer-events:none;border-radius:2px;}
.ball-asset{position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 10px #fff;}
.bat-asset{position:absolute;width:30px;height:30px;background:var(--wood);border-radius:50%;transform:translate(-50%,-50%);z-index:4;border:2px solid #000;}
.pitch-dot{position:absolute;width:22px;height:22px;background:rgba(255,255,255,0.3);border:1.5px solid #fff;border-radius:50%;transform:translate(-50%,-50%);z-index:1;}
</style>
</head>

<div id="v-frame"></div>

    <div id="field-container">

        <line x1="50" y1="98" x2="5" y2="48" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

// canSwing is set true by 3D engine during pre_blink + fly phases
// swung is set true when player taps — prevents double-scoring
var canSwing = false;
var swung    = false;

function dotPos(p) {
// 2D zone position from real pitch coords — same as 3D landing
var X_SCALE = 0.2159 / 0.75;
var sz_mid  = (p.sz_bot + p.sz_top) / 2;
var sz_half = (p.sz_top  - p.sz_bot) / 2;
var xn = -p.px / X_SCALE;
var yn = (p.pz - sz_mid) / sz_half;
return {
x: ((xn / 1.5) + 0.5) * (sz.offsetWidth  || 80),
y: (0.5 - (yn / 2.0)) * (sz.offsetHeight || 120),
strike: Math.abs(xn) <= 0.75 && Math.abs(yn) <= 1.0
};
}

function doSwing(clientX, clientY) {
if (!canSwing || swung || !curPitch) return;
swung = true;
canSwing = false;

var rect = sz.getBoundingClientRect();
var tx = clientX - rect.left;
var ty = clientY - rect.top;
var dp = dotPos(curPitch);
var dist = Math.sqrt((tx-dp.x)*(tx-dp.x)+(ty-dp.y)*(ty-dp.y));

// show bat + ball
sz.querySelectorAll('.bat-asset,.ball-asset').forEach(function(el){el.remove();});
var bat = document.createElement('div'); bat.className='bat-asset';

var ball = document.createElement('div'); ball.className='ball-asset';
ball.style.left=dp.x+'px'; ball.style.top=dp.y+'px'; sz.appendChild(ball);

// timing: how far through flight (negative=early, 0=perfect, positive=late)
var flightElapsed = phase==='fly' ? (performance.now()-flightStart)/1000 : (phase==='post_land'||phase==='post_climb' ? curPitch.tof+phaseT : -curPitch.tof);
var tDiff = flightElapsed - curPitch.tof;

if (dist < 30) {
    var la  = Math.round(((ty-dp.y)/15)*45);
    var ang = Math.round((dp.x-tx)*2.5);
    var ev  = Math.round(110-(dist*2.5)-(Math.abs(tDiff)*350));
    var ft  = Math.round((ev*4.3)*(Math.cos(la*Math.PI/180)));
    var ttag = tDiff<-0.15 ? 'EARLY' : (tDiff>0.05 ? 'LATE' : 'PERFECT');
    var ctag = dist<10 ? 'SQUARED' : (dist<20 ? 'SOLID' : 'WEAK');
    resSub.innerText = '['+ttag+'] '+(tDiff*1000).toFixed(0)+'ms | '+ctag+' | EV:'+ev;
    handleHit(ft, ang, la);
} else {
    resMain.innerText = 'SWING & MISS';
    resSub.innerText  = 'Miss '+Math.round(dist)+'px';
    addStrike('SWINGING');
}

// Called by 3D when ball lands — auto-score if not swung
function onLanded() {
var dp = dotPos(curPitch);
sz.querySelectorAll(’.pitch-dot’).forEach(function(el){el.remove();});
var dot = document.createElement(‘div’); dot.className=‘pitch-dot’;
dot.style.left=dp.x+‘px’; dot.style.top=dp.y+‘px’; sz.appendChild(dot);
dot.style.borderColor = dp.strike ? ‘#f1c40f’ : ‘#5599ff’;

}

function onPostLand() {
// called after post_land completes — now auto-score if not swung
if (!swung) {
var dp = dotPos(curPitch);
if (dp.strike) { addStrike(‘TAKEN’); resMain.innerText=‘CALLED STRIKE’; }
else            { addBall();          resMain.innerText=‘BALL’; }
updateUI();
}
canSwing = false;
}

// Called by 3D when new pitch starts
function onPitchStart() {
canSwing = true;
swung    = false;
sz.querySelectorAll(’.bat-asset,.ball-asset,.pitch-dot’).forEach(function(el){el.remove();});
resMain.innerText = ‘PITCH’;
resSub.innerText  = ‘’;
}

function handleHit(ft,angle,la){
var move=0,tag=‘OUT’;
if(Math.abs(angle)>52){if(ft>10&&ft<30){g.o++;g.b=0;g.s=0;resMain.innerText=‘FOUL OUT’;checkState();}else{addStrike(‘FOUL’);resMain.innerText=‘FOUL’;}updateUI();return;}

else if(ft<225){resMain.innerText=‘SINGLE (’+ft+‘ft)’;move=1;tag=‘1B’;}
else if(ft<325){resMain.innerText=‘DOUBLE (’+ft+‘ft)’;move=2;tag=‘2B’;}
else if(ft>=(Math.abs(angle)>35?335:400)){resMain.innerText=‘HOME RUN (’+ft+‘ft)’;move=4;tag=‘HR’;}
else{resMain.innerText=‘TRIPLE (’+ft+‘ft)’;move=3;tag=‘3B’;}

ln.setAttribute(‘stroke’,move>0?‘var(–gold)’:’#555’);ln.setAttribute(‘stroke-width’,‘1.5’);

document.getElementById(‘field-container’).appendChild(dtel);
}
if(move>0){g.b=0;g.s=0;advanceRunners(move);}else{g.o++;g.b=0;g.s=0;checkState();}
}
